<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StandLeo Team Finder</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .tab-btn.active { border-color: #22d3ee; color: #67e8f9; background: rgba(8, 47, 73, 0.45); }
    .pill { border: 1px solid rgb(51 65 85); border-radius: 10px; padding: 9px 12px; font-size: 13px; background: rgb(15 23 42); text-align: left; }
    .pill:hover { border-color: rgb(71 85 105); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="flex h-screen flex-col">
    <header class="border-b border-slate-800 bg-slate-950/95">
      <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 sm:px-6">
        <div>
          <div class="text-xs uppercase tracking-[0.24em] text-cyan-300">StandLeo</div>
          <h1 class="text-lg font-semibold sm:text-xl">Поиск тиммейтов и команд</h1>
        </div>
        <div class="flex items-center gap-2">
          <a href="https://t.me/h1nston" target="_blank" rel="noopener" class="rounded-lg border border-slate-700 px-3 py-2 text-xs hover:border-cyan-500">t.me/h1nston</a>
          <button id="createOpenBtn" class="rounded-lg bg-cyan-500 px-3 py-2 text-sm font-semibold text-slate-950 hover:bg-cyan-400">Создать</button>
        </div>
      </div>
      <div class="mx-auto hidden w-full max-w-6xl gap-2 px-4 pb-3 sm:flex sm:px-6">
        <button class="tab-btn active rounded-lg border border-slate-700 px-3 py-2 text-sm" data-tab="feed">Лента</button>
        <button class="tab-btn rounded-lg border border-slate-700 px-3 py-2 text-sm" data-tab="my">Мои</button>
        <button class="tab-btn rounded-lg border border-slate-700 px-3 py-2 text-sm" data-tab="chats">Сообщения</button>
        <button class="tab-btn rounded-lg border border-slate-700 px-3 py-2 text-sm" data-tab="settings">Настройки</button>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl flex-1 overflow-hidden px-4 pb-16 pt-4 sm:px-6 sm:pb-4">
      <section id="tab-feed" class="flex h-full flex-col gap-3 overflow-hidden">
        <div class="grid gap-2 sm:grid-cols-[1fr_auto_auto]">
          <input id="searchInput" placeholder="Поиск по заголовку, нику, клану, ID" class="rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm">
          <button id="filtersToggleBtn" class="rounded-lg border border-slate-700 px-3 py-2 text-sm hover:border-slate-500">Фильтры</button>
          <button id="filtersResetBtn" class="rounded-lg border border-slate-700 px-3 py-2 text-sm hover:border-slate-500">Сброс</button>
        </div>

        <div id="filtersPanel" class="hidden rounded-xl border border-slate-800 bg-slate-900/60 p-3">
          <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-3">
            <button class="pill" data-picker="mode" data-target="filterMode" data-label="Режим" data-empty="Любой"></button>
            <button class="pill" data-picker="region" data-target="filterRegion" data-label="Регион" data-empty="Любой"></button>
            <button class="pill" data-picker="rank" data-target="filterRank" data-label="Треб. ранг" data-empty="Любой"></button>
            <button class="pill" data-picker="kd" data-target="filterKd" data-label="Треб. KD" data-empty="Любой"></button>
            <button class="pill" data-picker="hours" data-target="filterHours" data-label="Треб. часы" data-empty="Любые"></button>
            <button class="pill" data-picker="voiceFilter" data-target="filterVoice" data-label="Голос" data-empty="Любой"></button>
          </div>
          <input id="filterMode" type="hidden">
          <input id="filterRegion" type="hidden">
          <input id="filterRank" type="hidden">
          <input id="filterKd" type="hidden">
          <input id="filterHours" type="hidden">
          <input id="filterVoice" type="hidden">
        </div>

        <div class="flex items-center justify-between text-xs text-slate-400">
          <span id="feedCount">0 объявлений</span>
        </div>
        <div id="feedList" class="flex-1 overflow-y-auto pr-1"></div>
      </section>

      <section id="tab-my" class="hidden h-full overflow-y-auto pr-1">
        <div id="myList" class="space-y-3"></div>
      </section>

      <section id="tab-chats" class="hidden h-full overflow-y-auto pr-1">
        <div id="chatsList" class="space-y-2"></div>
      </section>

      <section id="tab-settings" class="hidden h-full overflow-y-auto pr-1">
        <form id="settingsForm" class="space-y-3 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
          <h2 class="text-lg font-semibold">Профиль</h2>
          <div class="grid gap-3 sm:grid-cols-2">
            <input name="nickname" required maxlength="20" placeholder="Ник" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
            <input id="settingsGameId" name="gameId" required maxlength="20" placeholder="Игровой ID" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
            <input name="clan" maxlength="20" placeholder="Клан" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
            <button type="button" class="pill" data-picker="rank" data-target="settingsRank" data-label="Ранг" data-empty="Выбрать"></button>
            <button type="button" class="pill" data-picker="kd" data-target="settingsKd" data-label="KD" data-empty="Выбрать"></button>
            <button type="button" class="pill" data-picker="hours" data-target="settingsHours" data-label="Часы" data-empty="Выбрать"></button>
          </div>
          <input id="settingsRank" name="rank" type="hidden">
          <input id="settingsKd" name="kd" type="hidden">
          <input id="settingsHours" name="hours" type="hidden">
          <div class="flex gap-2">
            <button class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-cyan-400">Сохранить</button>
            <button id="logoutBtn" type="button" class="rounded-lg border border-slate-700 px-4 py-2 text-sm hover:border-slate-500">Сменить профиль</button>
          </div>
        </form>
      </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 grid grid-cols-4 gap-1 border-t border-slate-800 bg-slate-950 p-2 sm:hidden">
      <button class="tab-btn active rounded-lg border border-slate-700 py-2 text-xs" data-tab="feed">Лента</button>
      <button class="tab-btn rounded-lg border border-slate-700 py-2 text-xs" data-tab="my">Мои</button>
      <button class="tab-btn rounded-lg border border-slate-700 py-2 text-xs" data-tab="chats">Чаты</button>
      <button class="tab-btn rounded-lg border border-slate-700 py-2 text-xs" data-tab="settings">Настройки</button>
    </nav>
  </div>

  <div id="createModal" class="fixed inset-0 z-40 hidden items-end justify-center bg-slate-950/85 p-4 sm:items-center">
    <form id="createForm" class="w-full max-w-xl space-y-3 rounded-xl border border-slate-800 bg-slate-900 p-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Новое объявление</h2>
        <button id="createCloseBtn" type="button" class="rounded border border-slate-700 px-2 py-1 text-xs">Закрыть</button>
      </div>
      <input name="title" required maxlength="70" placeholder="Заголовок" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
      <textarea name="description" required maxlength="260" rows="4" placeholder="Кого ищешь и на какой режим" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm"></textarea>
      <div class="grid gap-2 sm:grid-cols-2">
        <button type="button" class="pill" data-picker="mode" data-target="adMode" data-label="Режим" data-empty="Выбрать"></button>
        <button type="button" class="pill" data-picker="region" data-target="adRegion" data-label="Регион" data-empty="Выбрать"></button>
        <button type="button" class="pill" data-picker="rank" data-target="adReqRank" data-label="Треб. ранг" data-empty="Любой"></button>
        <button type="button" class="pill" data-picker="kd" data-target="adReqKd" data-label="Треб. KD" data-empty="Любой"></button>
        <button type="button" class="pill" data-picker="hours" data-target="adReqHours" data-label="Треб. часы" data-empty="Любые"></button>
        <button type="button" class="pill" data-picker="voiceAd" data-target="adVoice" data-label="Голос" data-empty="Не важно"></button>
      </div>
      <input id="adMode" name="mode" type="hidden">
      <input id="adRegion" name="region" type="hidden">
      <input id="adReqRank" name="reqRank" type="hidden">
      <input id="adReqKd" name="reqKd" type="hidden">
      <input id="adReqHours" name="reqHours" type="hidden">
      <input id="adVoice" name="voice" type="hidden">
      <button class="w-full rounded-lg bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-cyan-400">Опубликовать</button>
    </form>
  </div>

  <aside id="chatPanel" class="fixed right-0 top-0 z-50 hidden h-full w-full max-w-md border-l border-slate-800 bg-slate-950 p-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold">Чат</h2>
      <button id="chatCloseBtn" class="rounded border border-slate-700 px-2 py-1 text-xs">Закрыть</button>
    </div>
    <div id="chatMeta" class="mt-1 text-xs text-slate-400"></div>
    <div id="chatMessages" class="mt-3 h-[70vh] space-y-2 overflow-y-auto pr-1"></div>
    <form id="chatForm" class="mt-3 flex gap-2">
      <input id="chatInput" required maxlength="180" placeholder="Сообщение" class="flex-1 rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm">
      <button class="rounded-lg bg-cyan-500 px-3 py-2 text-sm font-semibold text-slate-950">Отправить</button>
    </form>
  </aside>

  <div id="authOverlay" class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/95 p-4">
    <form id="authForm" class="w-full max-w-xl space-y-3 rounded-xl border border-slate-800 bg-slate-900 p-5">
      <h2 class="text-xl font-semibold">Профиль</h2>
      <p class="text-sm text-slate-400">Создай профиль, чтобы публиковать объявления и писать командам.</p>
      <div class="grid gap-3 sm:grid-cols-2">
        <input name="nickname" required maxlength="20" placeholder="Ник" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
        <input id="authGameId" name="gameId" required maxlength="20" placeholder="Игровой ID" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
        <input name="clan" maxlength="20" placeholder="Клан" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
        <button type="button" class="pill" data-picker="rank" data-target="authRank" data-label="Ранг" data-empty="Выбрать"></button>
        <button type="button" class="pill" data-picker="kd" data-target="authKd" data-label="KD" data-empty="Выбрать"></button>
        <button type="button" class="pill" data-picker="hours" data-target="authHours" data-label="Часы" data-empty="Выбрать"></button>
      </div>
      <input id="authRank" name="rank" type="hidden">
      <input id="authKd" name="kd" type="hidden">
      <input id="authHours" name="hours" type="hidden">
      <button class="w-full rounded-lg bg-cyan-500 px-4 py-2.5 font-semibold text-slate-950 hover:bg-cyan-400">Войти</button>
    </form>
  </div>

  <div id="pickerModal" class="fixed inset-0 z-[70] hidden items-end justify-center bg-slate-950/85 p-4 sm:items-center">
    <div class="w-full max-w-lg rounded-xl border border-slate-800 bg-slate-900 p-4">
      <div class="mb-3 flex items-center justify-between">
        <h3 id="pickerTitle" class="text-lg font-semibold">Выбор</h3>
        <button id="pickerCloseBtn" class="rounded border border-slate-700 px-2 py-1 text-xs">Закрыть</button>
      </div>
      <div id="pickerOptions" class="grid max-h-[55vh] grid-cols-1 gap-2 overflow-y-auto sm:grid-cols-2"></div>
    </div>
  </div>

  <template id="adTemplate">
    <article class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
      <div class="flex items-start justify-between gap-2">
        <div>
          <h3 class="ad-title text-base font-semibold"></h3>
          <p class="ad-meta mt-1 text-xs text-slate-400"></p>
        </div>
        <span class="ad-time text-xs text-slate-500"></span>
      </div>
      <p class="ad-desc mt-3 text-sm text-slate-200"></p>
      <div class="ad-tags mt-3 flex flex-wrap gap-2"></div>
      <div class="ad-actions mt-4 flex flex-wrap gap-2"></div>
    </article>
  </template>

  <script>
    (() => {
      const KEYS = {
        profile: 'standleo_profile_v6',
        ads: 'standleo_ads_v6',
        chats: 'standleo_chats_v6',
        limits: 'standleo_limits_v6'
      };

      const RANKS = ['Bronze', 'Silver', 'Gold', 'Phoenix', 'Ranger', 'Champion', 'Master', 'Elite', 'Legend'];
      const KD_VALUES = ['0.00-0.50', '0.50-1.00', '1.00-1.50', '1.50-2.00', '2.00-2.50', '2.50-3.00', '3.50-4.00', '4.50-5.00', '5.00+'];
      const HOUR_VALUES = ['0-50', '50-100', '100-250', '250-500', '500-750', '750-1000', '1000-1500', '1500+'];
      const MODE_VALUES = ['Соревновательный', 'Кланвар', 'Турнир', 'Напарники'];
      const REGION_VALUES = ['RU', 'EU', 'RU/EU', 'Любой'];
      const VOICE_FILTER_VALUES = ['Только с голосом', 'Только без голоса'];
      const VOICE_AD_VALUES = ['Нужен голос', 'Без голоса'];

      const PICKERS = {
        rank: RANKS,
        kd: KD_VALUES,
        hours: HOUR_VALUES,
        mode: MODE_VALUES,
        region: REGION_VALUES,
        voiceFilter: VOICE_FILTER_VALUES,
        voiceAd: VOICE_AD_VALUES
      };

      const $ = (s, p = document) => p.querySelector(s);
      const $$ = (s, p = document) => Array.from(p.querySelectorAll(s));
      const sanitize = (v) => String(v || '').trim().replace(/\s+/g, ' ');
      const uid = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;

      const load = (k, fallback) => {
        try {
          const v = localStorage.getItem(k);
          return v ? JSON.parse(v) : fallback;
        } catch {
          return fallback;
        }
      };
      const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

      const hasLink = (t) => /(https?:\/\/|www\.|t\.me\/|discord\.gg|@\w+)/i.test(t);
      const bannedWords = ['нарко', 'заклад', 'порно', 'взлом', 'читы'];
      const hasBanned = (t) => bannedWords.some((w) => t.toLowerCase().includes(w));
      const isValidGameId = (id) => /^[A-Za-z0-9]{4,20}$/.test(id);

      const state = {
        profile: load(KEYS.profile, null),
        ads: load(KEYS.ads, []),
        chats: load(KEYS.chats, {}),
        limits: load(KEYS.limits, {}),
        tab: 'feed',
        activeChatAdId: null,
        picker: null
      };

      const channel = 'BroadcastChannel' in window ? new BroadcastChannel('standleo_live_v6') : null;
      const sync = () => {
        if (channel) channel.postMessage({ at: Date.now() });
        localStorage.setItem('standleo_sync_v6', String(Date.now()));
      };

      const getLimitState = () => {
        if (!state.profile) return null;
        if (!state.limits[state.profile.uid]) {
          state.limits[state.profile.uid] = { adTimes: [], lastAdHash: '', lastMsgAt: 0, lastMsgHash: '' };
        }
        return state.limits[state.profile.uid];
      };

      const setTab = (tab) => {
        state.tab = tab;
        ['feed', 'my', 'chats', 'settings'].forEach((name) => {
          $(`#tab-${name}`).classList.toggle('hidden', name !== tab);
        });
        $$('.tab-btn').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
      };

      const setPickerButtonText = (btn, value) => {
        const empty = btn.dataset.empty || 'Не выбрано';
        btn.textContent = `${btn.dataset.label}: ${value || empty}`;
      };

      const setFieldValue = (fieldId, value) => {
        const field = $(`#${fieldId}`);
        if (!field) return;
        field.value = value || '';
        const btn = $$('[data-target]').find((x) => x.dataset.target === fieldId);
        if (btn) setPickerButtonText(btn, field.value);
      };

      const openPicker = ({ title, options, current, emptyLabel, onPick }) => {
        state.picker = { onPick };
        $('#pickerTitle').textContent = title;
        const root = $('#pickerOptions');
        root.innerHTML = '';

        const makeOption = (value, text) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = `rounded-lg border px-3 py-2 text-left text-sm ${value === current ? 'border-cyan-500 bg-cyan-950/40' : 'border-slate-700 bg-slate-950 hover:border-slate-500'}`;
          b.textContent = text;
          b.addEventListener('click', () => {
            state.picker.onPick(value, text);
            closePicker();
          });
          root.append(b);
        };

        if (emptyLabel) makeOption('', emptyLabel);
        options.forEach((opt) => makeOption(opt, opt));

        $('#pickerModal').classList.remove('hidden');
        $('#pickerModal').classList.add('flex');
      };

      const closePicker = () => {
        $('#pickerModal').classList.add('hidden');
        $('#pickerModal').classList.remove('flex');
      };

      const formatDate = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

      const adMatchesFilters = (ad) => {
        const q = $('#searchInput').value.trim().toLowerCase();
        const mode = $('#filterMode').value;
        const region = $('#filterRegion').value;
        const rank = $('#filterRank').value;
        const kd = $('#filterKd').value;
        const hours = $('#filterHours').value;
        const voice = $('#filterVoice').value;

        if (mode && ad.mode !== mode) return false;
        if (region && ad.region !== region) return false;
        if (rank && ad.reqRank !== rank) return false;
        if (kd && ad.reqKd !== kd) return false;
        if (hours && ad.reqHours !== hours) return false;
        if (voice === 'Только с голосом' && !ad.voiceNeeded) return false;
        if (voice === 'Только без голоса' && ad.voiceNeeded) return false;

        if (!q) return true;
        const text = `${ad.title} ${ad.description} ${ad.author.nickname} ${ad.author.clan} ${ad.author.gameId}`.toLowerCase();
        return text.includes(q);
      };

      const tag = (text) => {
        const span = document.createElement('span');
        span.className = 'rounded border border-slate-700 px-2 py-1 text-xs text-slate-300';
        span.textContent = text;
        return span;
      };

      const openChat = (adId) => {
        const ad = state.ads.find((x) => x.id === adId);
        if (!ad || !state.profile) return;
        if (ad.authorUid === state.profile.uid) {
          alert('Нельзя писать самому себе.');
          return;
        }
        state.activeChatAdId = adId;
        $('#chatPanel').classList.remove('hidden');
        renderChat();
      };

      const renderFeed = () => {
        const root = $('#feedList');
        root.innerHTML = '';

        const list = [...state.ads].sort((a, b) => b.createdAt - a.createdAt).filter(adMatchesFilters);
        $('#feedCount').textContent = `${list.length} объявлений`;

        if (!list.length) {
          root.innerHTML = '<div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4 text-sm text-slate-400">Объявлений не найдено.</div>';
          return;
        }

        const tpl = $('#adTemplate');
        list.forEach((ad) => {
          const node = tpl.content.firstElementChild.cloneNode(true);
          $('.ad-title', node).textContent = ad.title;
          $('.ad-meta', node).textContent = `${ad.author.nickname} (${ad.author.gameId}) | ${ad.author.clan || 'Без клана'} | ${ad.author.rank} | KD ${ad.author.kd} | ${ad.author.hours} ч`;
          $('.ad-time', node).textContent = formatDate(ad.createdAt);
          $('.ad-desc', node).textContent = ad.description;

          const tags = $('.ad-tags', node);
          [ad.mode, ad.region, `Треб. ранг: ${ad.reqRank || 'Любой'}`, `Треб. KD: ${ad.reqKd || 'Любой'}`, `Треб. часы: ${ad.reqHours || 'Любые'}`, ad.voiceNeeded ? 'Нужен голос' : 'Без голоса'].forEach((t) => tags.append(tag(t)));

          const actions = $('.ad-actions', node);
          const isOwn = state.profile && ad.authorUid === state.profile.uid;

          if (isOwn) {
            const own = document.createElement('span');
            own.className = 'rounded-lg border border-cyan-800 bg-cyan-950/30 px-3 py-1.5 text-xs text-cyan-200';
            own.textContent = 'Твое объявление';
            actions.append(own);
          } else {
            const msgBtn = document.createElement('button');
            msgBtn.className = 'rounded-lg bg-cyan-500 px-3 py-1.5 text-xs font-semibold text-slate-950 hover:bg-cyan-400';
            msgBtn.textContent = 'Написать';
            msgBtn.addEventListener('click', () => openChat(ad.id));
            actions.append(msgBtn);
          }

          const copyBtn = document.createElement('button');
          copyBtn.className = 'rounded-lg border border-slate-700 px-3 py-1.5 text-xs hover:border-slate-500';
          copyBtn.textContent = 'Скопировать ID';
          copyBtn.addEventListener('click', async () => {
            try {
              await navigator.clipboard.writeText(ad.author.gameId);
              copyBtn.textContent = 'Скопировано';
              setTimeout(() => { copyBtn.textContent = 'Скопировать ID'; }, 1000);
            } catch {
              copyBtn.textContent = ad.author.gameId;
            }
          });
          actions.append(copyBtn);

          if (isOwn) {
            const delBtn = document.createElement('button');
            delBtn.className = 'rounded-lg border border-red-800 px-3 py-1.5 text-xs text-red-300 hover:bg-red-950/30';
            delBtn.textContent = 'Удалить';
            delBtn.addEventListener('click', () => {
              state.ads = state.ads.filter((x) => x.id !== ad.id);
              save(KEYS.ads, state.ads);
              sync();
              renderAll();
            });
            actions.append(delBtn);
          }

          root.append(node);
        });
      };

      const renderMy = () => {
        const root = $('#myList');
        root.innerHTML = '';
        if (!state.profile) return;

        const own = [...state.ads].filter((a) => a.authorUid === state.profile.uid).sort((a, b) => b.createdAt - a.createdAt);
        if (!own.length) {
          root.innerHTML = '<div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4 text-sm text-slate-400">У тебя еще нет объявлений.</div>';
          return;
        }

        own.forEach((ad) => {
          const box = document.createElement('div');
          box.className = 'rounded-lg border border-slate-800 bg-slate-900/50 p-4';
          box.innerHTML = `<div class="text-sm font-semibold">${ad.title}</div><div class="mt-1 text-xs text-slate-400">${formatDate(ad.createdAt)} | ${ad.mode} | ${ad.region}</div><div class="mt-2 text-sm text-slate-300">${ad.description}</div>`;
          root.append(box);
        });
      };

      const renderChatsList = () => {
        const root = $('#chatsList');
        root.innerHTML = '';
        if (!state.profile) return;

        const threads = [];
        Object.entries(state.chats).forEach(([adId, msgs]) => {
          const mine = msgs.some((m) => m.senderUid === state.profile.uid);
          if (!mine) return;
          const last = msgs[msgs.length - 1];
          const ad = state.ads.find((a) => a.id === adId);
          threads.push({ adId, ad, last });
        });
        threads.sort((a, b) => b.last.at - a.last.at);

        if (!threads.length) {
          root.innerHTML = '<div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4 text-sm text-slate-400">Сообщений пока нет.</div>';
          return;
        }

        threads.forEach((t) => {
          const btn = document.createElement('button');
          btn.className = 'w-full rounded-lg border border-slate-800 bg-slate-900/50 p-3 text-left hover:border-slate-600';
          btn.innerHTML = `<div class="text-sm font-semibold">${t.ad ? t.ad.title : 'Объявление удалено'}</div><div class="mt-1 text-xs text-slate-400">${t.last.senderName}: ${t.last.text.slice(0, 80)}</div>`;
          btn.addEventListener('click', () => openChat(t.adId));
          root.append(btn);
        });
      };

      const renderChat = () => {
        const adId = state.activeChatAdId;
        if (!adId) return;
        const ad = state.ads.find((a) => a.id === adId);
        const root = $('#chatMessages');
        root.innerHTML = '';
        $('#chatMeta').textContent = ad ? `${ad.title} | ${ad.author.nickname}` : 'Объявление удалено';

        const msgs = state.chats[adId] || [];
        msgs.forEach((m) => {
          const mine = state.profile && m.senderUid === state.profile.uid;
          const row = document.createElement('div');
          row.className = `max-w-[90%] rounded-lg border px-3 py-2 text-sm ${mine ? 'ml-auto border-cyan-700 bg-cyan-950/40' : 'border-slate-700 bg-slate-900'}`;
          row.innerHTML = `<div>${m.text}</div><div class="mt-1 text-[10px] text-slate-400">${m.senderName} | ${formatDate(m.at)}</div>`;
          root.append(row);
        });
        root.scrollTop = root.scrollHeight;
      };

      const renderSettings = () => {
        if (!state.profile) return;
        const f = $('#settingsForm');
        f.nickname.value = state.profile.nickname;
        f.gameId.value = state.profile.gameId;
        f.clan.value = state.profile.clan || '';
        setFieldValue('settingsRank', state.profile.rank);
        setFieldValue('settingsKd', state.profile.kd);
        setFieldValue('settingsHours', state.profile.hours);
      };

      const renderAll = () => {
        renderFeed();
        renderMy();
        renderChatsList();
        renderSettings();
      };

      const applyAuthState = () => {
        $('#authOverlay').classList.toggle('hidden', Boolean(state.profile));
      };

      const resetCreateForm = () => {
        $('#createForm').reset();
        setFieldValue('adMode', '');
        setFieldValue('adRegion', '');
        setFieldValue('adReqRank', '');
        setFieldValue('adReqKd', '');
        setFieldValue('adReqHours', '');
        setFieldValue('adVoice', '');
      };

      const bindPickerButtons = () => {
        $$('[data-target]').forEach((btn) => setPickerButtonText(btn, $(`#${btn.dataset.target}`).value));

        $$('[data-picker]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const fieldId = btn.dataset.target;
            const key = btn.dataset.picker;
            const options = PICKERS[key] || [];
            const current = $(`#${fieldId}`).value;
            const empty = btn.dataset.empty || null;

            openPicker({
              title: btn.dataset.label,
              options,
              current,
              emptyLabel: empty,
              onPick: (value) => {
                if (fieldId === 'adVoice') {
                  setFieldValue('adVoice', value === 'Нужен голос' ? '1' : value === 'Без голоса' ? '0' : '');
                  setPickerButtonText(btn, value || empty);
                } else {
                  setFieldValue(fieldId, value);
                }
                renderFeed();
              }
            });
          });
        });
      };

      const bindGameIdInput = (input) => {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/[^A-Za-z0-9]/g, '').slice(0, 20);
        });
      };

      $('#authForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const f = e.currentTarget;
        const profile = {
          uid: uid(),
          nickname: sanitize(f.nickname.value).slice(0, 20),
          gameId: sanitize(f.gameId.value),
          clan: sanitize(f.clan.value).slice(0, 20),
          rank: f.rank.value,
          kd: f.kd.value,
          hours: f.hours.value
        };

        if (!isValidGameId(profile.gameId)) {
          alert('ID: 4-20 символов, только латинские буквы и цифры.');
          return;
        }
        if (!profile.rank || !profile.kd || !profile.hours) {
          alert('Выбери ранг, KD и часы.');
          return;
        }

        state.profile = profile;
        save(KEYS.profile, state.profile);
        applyAuthState();
        renderAll();
      });

      $('#settingsForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!state.profile) return;
        const f = e.currentTarget;
        const nextGameId = sanitize(f.gameId.value);

        if (!isValidGameId(nextGameId)) {
          alert('ID: 4-20 символов, только латинские буквы и цифры.');
          return;
        }

        state.profile.nickname = sanitize(f.nickname.value).slice(0, 20);
        state.profile.gameId = nextGameId;
        state.profile.clan = sanitize(f.clan.value).slice(0, 20);
        state.profile.rank = f.rank.value;
        state.profile.kd = f.kd.value;
        state.profile.hours = f.hours.value;

        save(KEYS.profile, state.profile);
        state.ads = state.ads.map((ad) => ad.authorUid === state.profile.uid ? { ...ad, author: { ...state.profile } } : ad);
        save(KEYS.ads, state.ads);
        sync();
        renderAll();
      });

      $('#logoutBtn').addEventListener('click', () => {
        if (!confirm('Сбросить текущий профиль?')) return;
        localStorage.removeItem(KEYS.profile);
        state.profile = null;
        applyAuthState();
      });

      $('#createOpenBtn').addEventListener('click', () => {
        if (!state.profile) {
          alert('Сначала создай профиль.');
          return;
        }
        $('#createModal').classList.remove('hidden');
        $('#createModal').classList.add('flex');
      });

      $('#createCloseBtn').addEventListener('click', () => {
        $('#createModal').classList.add('hidden');
        $('#createModal').classList.remove('flex');
      });

      $('#createForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!state.profile) return;
        const f = e.currentTarget;
        const title = sanitize(f.title.value);
        const description = sanitize(f.description.value);
        const combined = `${title} ${description}`;

        if (!f.mode.value || !f.region.value) {
          alert('Выбери режим и регион.');
          return;
        }
        if (title.length < 4 || description.length < 8) {
          alert('Слишком короткий текст объявления.');
          return;
        }
        if (hasLink(combined) || hasBanned(combined)) {
          alert('Объявление не прошло модерацию.');
          return;
        }

        const lim = getLimitState();
        const now = Date.now();
        lim.adTimes = lim.adTimes.filter((t) => now - t < 24 * 60 * 60 * 1000);

        if (lim.adTimes.length >= 8) {
          alert('Лимит: 8 объявлений за 24 часа.');
          return;
        }
        if (lim.adTimes.length && now - lim.adTimes[lim.adTimes.length - 1] < 90 * 1000) {
          alert('Подожди 90 секунд перед новым объявлением.');
          return;
        }

        const hash = `${title.toLowerCase()}|${description.toLowerCase()}`;
        if (lim.lastAdHash === hash) {
          alert('Повтор объявления заблокирован.');
          return;
        }

        const ad = {
          id: uid(),
          createdAt: now,
          authorUid: state.profile.uid,
          author: { ...state.profile },
          title,
          description,
          mode: f.mode.value,
          region: f.region.value,
          reqRank: f.reqRank.value,
          reqKd: f.reqKd.value,
          reqHours: f.reqHours.value,
          voiceNeeded: f.voice.value === '1'
        };

        state.ads.push(ad);
        lim.adTimes.push(now);
        lim.lastAdHash = hash;

        save(KEYS.ads, state.ads);
        save(KEYS.limits, state.limits);
        sync();
        resetCreateForm();
        $('#createModal').classList.add('hidden');
        $('#createModal').classList.remove('flex');
        renderAll();
      });

      $('#chatCloseBtn').addEventListener('click', () => {
        state.activeChatAdId = null;
        $('#chatPanel').classList.add('hidden');
      });

      $('#chatForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!state.profile || !state.activeChatAdId) return;

        const ad = state.ads.find((x) => x.id === state.activeChatAdId);
        if (ad && ad.authorUid === state.profile.uid) {
          alert('Нельзя писать самому себе.');
          return;
        }

        const input = $('#chatInput');
        const text = sanitize(input.value);
        if (text.length < 2) return;
        if (hasLink(text) || hasBanned(text)) {
          alert('Сообщение не прошло модерацию.');
          return;
        }

        const lim = getLimitState();
        const now = Date.now();
        if (now - lim.lastMsgAt < 4000) {
          alert('Подожди 4 секунды перед новым сообщением.');
          return;
        }
        const msgHash = text.toLowerCase();
        if (msgHash === lim.lastMsgHash) {
          alert('Повтор сообщения заблокирован.');
          return;
        }

        if (!state.chats[state.activeChatAdId]) state.chats[state.activeChatAdId] = [];
        state.chats[state.activeChatAdId].push({
          id: uid(),
          senderUid: state.profile.uid,
          senderName: state.profile.nickname,
          text,
          at: now
        });

        lim.lastMsgAt = now;
        lim.lastMsgHash = msgHash;

        save(KEYS.chats, state.chats);
        save(KEYS.limits, state.limits);
        sync();
        input.value = '';
        renderChat();
        renderChatsList();
      });

      $('#filtersToggleBtn').addEventListener('click', () => $('#filtersPanel').classList.toggle('hidden'));
      $('#filtersResetBtn').addEventListener('click', () => {
        $('#searchInput').value = '';
        ['filterMode', 'filterRegion', 'filterRank', 'filterKd', 'filterHours', 'filterVoice'].forEach((id) => setFieldValue(id, ''));
        renderFeed();
      });
      $('#searchInput').addEventListener('input', renderFeed);

      $$('.tab-btn').forEach((b) => b.addEventListener('click', () => setTab(b.dataset.tab)));
      $('#pickerCloseBtn').addEventListener('click', closePicker);

      const onRemoteSync = () => {
        state.ads = load(KEYS.ads, []);
        state.chats = load(KEYS.chats, {});
        state.limits = load(KEYS.limits, {});
        renderAll();
        if (state.activeChatAdId) renderChat();
      };

      if (channel) channel.onmessage = onRemoteSync;
      window.addEventListener('storage', (e) => {
        if ([KEYS.ads, KEYS.chats, KEYS.limits, 'standleo_sync_v6'].includes(e.key)) onRemoteSync();
      });

      bindGameIdInput($('#authGameId'));
      bindGameIdInput($('#settingsGameId'));
      bindPickerButtons();

      setFieldValue('authRank', RANKS[0]);
      setFieldValue('authKd', KD_VALUES[0]);
      setFieldValue('authHours', HOUR_VALUES[0]);
      setFieldValue('settingsRank', RANKS[0]);
      setFieldValue('settingsKd', KD_VALUES[0]);
      setFieldValue('settingsHours', HOUR_VALUES[0]);

      applyAuthState();
      setTab('feed');
      renderAll();
    })();
  </script>
</body>
</html>
